<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자막 추출기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0e0e14;
      color: #f0f0f0;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
    }
    .wrap { width: 100%; max-width: 680px; }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff4444, #cc0000);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
    }
    h1 { font-size: 30px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
    .sub { color: #555; font-size: 14px; margin-bottom: 28px; }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 12px 0;
      border-radius: 12px;
      border: 1.5px solid #2a2a3a;
      background: transparent;
      color: #666;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      border-color: #ff4444;
      background: rgba(255,68,68,0.1);
      color: #ff6666;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1.5px solid #2a2a3a;
      background: #0e0e14;
      color: #f0f0f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 12px;
    }
    input[type="text"]:focus { border-color: #ff4444; }
    input::placeholder { color: #444; }

    .input-row { display: flex; gap: 10px; align-items: flex-start; }
    .input-row input[type="text"] { margin-bottom: 0; }

    /* 파일 업로드 영역 */
    .drop-zone {
      border: 2px dashed #2a2a3a;
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 14px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #ff4444;
      background: rgba(255,68,68,0.05);
    }
    .drop-zone .icon { font-size: 36px; margin-bottom: 10px; }
    .drop-zone .label { font-size: 14px; color: #888; }
    .drop-zone .label span { color: #ff6666; font-weight: 700; }
    .drop-zone .formats { font-size: 11px; color: #444; margin-top: 6px; }
    .file-selected {
      background: rgba(68,204,136,0.08);
      border-color: #44cc88;
      border-style: solid;
    }
    .file-selected .label { color: #44cc88; }
    input[type="file"] { display: none; }

    button.btn-main {
      width: 100%;
      padding: 13px 22px;
      border-radius: 10px;
      border: none;
      background: #ff4444;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.btn-main:hover { background: #cc2222; }
    button.btn-main:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }

    .thumbnail { margin-top: 16px; border-radius: 10px; overflow: hidden; position: relative; }
    .thumbnail img { width: 100%; display: block; }
    .thumbnail .vid-id {
      position: absolute; bottom: 10px; left: 12px;
      font-size: 11px; color: #ccc;
      background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px;
    }

    .loading { text-align: center; padding: 32px 0; color: #666; font-size: 14px; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #2a2a3a; border-top-color: #ff4444;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      padding: 14px 18px;
      background: rgba(255,68,68,0.08);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: 12px; color: #ff8888; font-size: 14px; margin-bottom: 20px;
    }

    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .result-label { font-size: 13px; color: #666; }
    button.btn-copy {
      padding: 7px 16px; border-radius: 8px;
      border: 1px solid #3a3a4a; background: transparent;
      color: #aaa; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    button.btn-copy.copied { border-color: #44cc88; color: #44cc88; background: rgba(68,204,136,0.1); }

    .result-box {
      background: #0e0e14; border: 1px solid #2a2a3a; border-radius: 14px;
      padding: 24px; max-height: 460px; overflow-y: auto;
      font-size: 14px; line-height: 2; color: #d8d8e8;
      white-space: pre-wrap; word-break: break-word;
    }
    .char-count { text-align: right; font-size: 11px; color: #333; margin-top: 8px; }
    footer { text-align: center; color: #2a2a3a; font-size: 11px; margin-top: 40px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="badge">▶ 자막 추출기</div>
  <h1>텍스트 변환기</h1>
  <p class="sub">YouTube URL 또는 음원 파일로 자막을 텍스트로 변환해요</p>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('youtube')">🎬 YouTube URL</button>
    <button class="tab" onclick="switchTab('audio')">🎵 음원 파일 업로드</button>
  </div>

  <div class="card">
    <!-- YouTube 패널 -->
    <div id="panel-youtube" class="panel active">
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
        <button class="btn-main" style="width:auto; white-space:nowrap;" onclick="extractYoutube()">추출하기</button>
      </div>
      <div id="thumbArea"></div>
    </div>

    <!-- 음원 파일 패널 -->
    <div id="panel-audio" class="panel">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">🎵</div>
        <div class="label" id="dropLabel">파일을 <span>클릭</span>하거나 여기에 드래그하세요</div>
        <div class="formats">mp3 · mp4 · wav · webm · ogg · 최대 25MB</div>
      </div>
      <input type="file" id="fileInput" accept=".mp3,.mp4,.wav,.webm,.ogg,audio/*" />
      <button class="btn-main" onclick="extractAudio()">변환하기</button>
    </div>
  </div>

  <div id="loadingArea" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div id="loadingMsg">처리 중이에요...</div>
  </div>

  <div id="errorArea" class="error" style="display:none;"></div>

  <div id="resultArea" style="display:none;">
    <div class="result-header">
      <span class="result-label">📄 추출된 텍스트</span>
      <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 전체 복사</button>
    </div>
    <div class="result-box" id="resultBox"></div>
    <div class="char-count" id="charCount"></div>
  </div>

  <footer>자막이 없는 영상이나 25MB 초과 파일은 처리가 어려울 수 있어요</footer>
</div>

<script>
  let currentTab = 'youtube';
  let selectedFile = null;

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'youtube') || (i === 1 && tab === 'audio'));
    });
    document.getElementById('panel-youtube').classList.toggle('active', tab === 'youtube');
    document.getElementById('panel-audio').classList.toggle('active', tab === 'audio');
    clearResult();
  }

  function clearResult() {
    document.getElementById('errorArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('loadingArea').style.display = 'none';
  }

  // YouTube 썸네일 미리보기
  function extractVideoId(url) {
    const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  document.getElementById('urlInput').addEventListener('input', function() {
    const vid = extractVideoId(this.value.trim());
    const thumbArea = document.getElementById('thumbArea');
    thumbArea.innerHTML = vid ? `
      <div class="thumbnail" style="margin-top:16px;">
        <img src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" alt="썸네일" />
        <span class="vid-id">ID: ${vid}</span>
      </div>` : '';
  });

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') extractYoutube();
  });

  // 파일 선택
  document.getElementById('fileInput').addEventListener('change', function() {
    if (this.files[0]) setFile(this.files[0]);
  });

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function setFile(file) {
    selectedFile = file;
    const dropZone = document.getElementById('dropZone');
    dropZone.classList.add('file-selected');
    document.getElementById('dropLabel').innerHTML = `✅ <span>${file.name}</span> (${(file.size/1024/1024).toFixed(1)}MB)`;
  }

  // YouTube 추출
  async function extractYoutube() {
    clearResult();
    const url = document.getElementById('urlInput').value.trim();
    const videoId = extractVideoId(url);
    if (!videoId) { showError('올바른 YouTube URL을 입력해주세요.'); return; }

    showLoading('자막을 가져오는 중이에요...');
    try {
      const res = await fetch(`/api/transcript?videoId=${videoId}`);
      const data = await res.json();
      if (data.success && data.text) showResult(data.text);
      else showError(data.error || '자막을 가져오지 못했어요.');
    } catch (e) { showError('오류: ' + e.message); }
    finally { hideLoading(); }
  }

  // 음원 변환
  async function extractAudio() {
    clearResult();
    if (!selectedFile) { showError('음원 파일을 먼저 선택해주세요.'); return; }

    showLoading('Whisper AI로 변환 중이에요... (파일 크기에 따라 1~2분 소요될 수 있어요)');
    try {
      const formData = new FormData();
      formData.append('audio', selectedFile);

      const res = await fetch('/api/whisper', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success && data.text) showResult(data.text);
      else showError(data.error || '변환에 실패했어요.');
    } catch (e) { showError('오류: ' + e.message); }
    finally { hideLoading(); }
  }

  function showLoading(msg) {
    document.getElementById('loadingMsg').textContent = msg;
    document.getElementById('loadingArea').style.display = 'block';
  }
  function hideLoading() { document.getElementById('loadingArea').style.display = 'none'; }
  function showError(msg) {
    const el = document.getElementById('errorArea');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }
  function showResult(text) {
    document.getElementById('resultBox').textContent = text;
    document.getElementById('charCount').textContent = `${text.length.toLocaleString()}자`;
    document.getElementById('resultArea').style.display = 'block';
  }
  function copyText() {
    const text = document.getElementById('resultBox').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ 복사됨!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 전체 복사'; btn.classList.remove('copied'); }, 2200);
    });
  }
</script>
</body>
</html>
